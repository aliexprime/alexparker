<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alex Parker</title>
  <meta name="description" content="Alex Parker">
  <style>
    :root {
      --bg: #f7f6f3;
      --text: #171717;
      --muted: rgba(23, 23, 23, 0.45);
      --muted-2: rgba(23, 23, 23, 0.25);
      --line-base: rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 32px;
      position: relative;
    }

    .header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 10;
      pointer-events: none;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .brand,
    .contact,
    .footer-label {
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }

    .brand { color: var(--muted); }
    .contact {
      color: var(--muted-2);
      pointer-events: auto;
      transition: color 180ms ease;
    }
    .contact:hover { color: var(--text); }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
    }

    .viz-wrap {
      width: min(100%, 1100px);
      height: clamp(180px, 36vw, 420px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    svg.chart {
      width: min(1100px, 100vw - 48px);
      height: auto;
      overflow: visible;
      display: block;
      transform: translateZ(0);
    }

    .footer {
      position: relative;
      z-index: 2;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .footer-label {
      color: var(--muted-2);
      user-select: none;
    }

    #activeTrail {
      animation: trailScale 20s ease-in-out infinite;
      transform-origin: center;
      will-change: transform;
    }

    @keyframes drift {
      0%   { transform: translate3d(0, 0, 0); }
      50%  { transform: translate3d(0, -4px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    @keyframes trailScale {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    .viz-wrap {
      animation: drift 20s ease-in-out infinite;
    }

    @media (min-width: 768px) {
      .page { padding: 36px 48px 48px; }
      .header-inner { padding: 32px 48px; }
      .brand, .contact, .footer-label { font-size: 11px; letter-spacing: 0.32em; }
      .footer { padding-top: 32px; }
      svg.chart { width: min(1100px, 100vw - 140px); }
    }
  </style>
</head>

  <script>
    (function () {
      const trail = document.getElementById('activeTrail');
      if (!trail) return;

      const duration = 20000;
      const visibleFraction = 0.14;
      let startTime = null;

      const totalLength = trail.getTotalLength();
      const visibleLength = totalLength * visibleFraction;
      const gapLength = totalLength;

      trail.style.strokeDasharray = `${visibleLength} ${gapLength}`;
      trail.style.strokeDashoffset = '0';

      function frame(ts) {
        if (startTime === null) startTime = ts;
        const elapsed = (ts - startTime) % duration;
        const progress = elapsed / duration;
        const maxTravel = totalLength * 0.86;
        const offset = progress * maxTravel;

        trail.style.strokeDashoffset = `${-offset}`;
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();
  </script>
